[pytest]
# Test configuration - results written to tests/output/
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Output paths
junit_family = xunit2

# Improve output clarity
addopts = 
    -v
    --tb=short
    --junit-xml=tests/output/report.xml
    --log-file=tests/output/pytest.log
    --log-file-level=DEBUG
